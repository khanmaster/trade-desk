name: Infra Provision

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        type: choice
        options:
          - plan
          - apply

# NOTE: This workflow requires terraform.tfstate to be present.
# State is managed locally. Run Terraform from your local machine:
#
#   cd infra/terraform
#   terraform plan  -var="github_token=<your-token>"
#   terraform apply -var="github_token=<your-token>"
#
# This workflow is reserved for future use when remote state is configured.

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest

    env:
      TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
      TF_VAR_github_owner: ${{ vars.REPO_OWNER }}
      TF_VAR_repo_name:    ${{ vars.REPO_NAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Warn if no state file
        working-directory: infra/terraform
        run: |
          if [ ! -f terraform.tfstate ]; then
            echo "⚠️  WARNING: No terraform.tfstate found."
            echo "This plan will show all resources as new even if they already exist."
            echo "Run Terraform locally where state is present."
          fi

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        working-directory: infra/terraform
        run: terraform plan -out=tfplan

      - name: Upload plan artifact
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: infra/terraform/tfplan
          retention-days: 90

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan
