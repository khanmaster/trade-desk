name: CI/CD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─── JOB 1: BUILD ONCE ───────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Run tests
        run: npm test
        working-directory: app

      - name: Build (PROD config)
        run: npm run build
        working-directory: app
        env:
          VITE_ENV: prod
          VITE_BASE_PATH: /${{ vars.REPO_NAME }}/

      # Artifact name includes run_id — all jobs in this run use the same artifact
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: app/dist
          retention-days: 90

  # ─── JOB 2: DEV SMOKE CHECK (auto, no public URL) ────────────────────────────
  deploy-dev:
    name: Deploy DEV
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: dist

      - name: DEV smoke check
        run: |
          echo "✅ DEV build verified"
          echo "Build artifact contents:"
          ls -la dist/
          echo "index.html present: $(test -f dist/index.html && echo YES || echo NO)"

  # ─── JOB 3: DEPLOY PROD (manual approval gate via GitHub Environment) ─────────
  deploy-prod:
    name: Deploy PROD
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod   # ← approval gate is configured in GitHub UI on this environment
    steps:
      - name: Download SAME build artifact (no rebuild)
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages
